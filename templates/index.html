<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT语音视频生成系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* 进度条动画 */
        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 阶段图标脉冲 */
        .stage-active {
            animation: pulse-blue 1.5s ease-in-out infinite;
        }
        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
            50% { box-shadow: 0 0 0 10px rgba(59,130,246,0); }
        }

        /* 打字机效果 */
        .detail-text {
            overflow: hidden;
            white-space: nowrap;
            animation: typing 0.3s steps(20,end);
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center min-h-screen pt-6">

    <!-- 🆕 User Bar -->
    <div class="w-full max-w-2xl mx-4 mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">PPT语音视频生成系统</h1>
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500">👤 {{ user.display_name or user.username }}</span>
            <a href="/logout" class="text-xs text-gray-400 hover:text-red-500 transition-colors">退出</a>
        </div>
    </div>

    <!-- Main Form Area -->
    <div id="form-card" class="bg-white p-10 rounded-2xl shadow-lg max-w-2xl w-full mx-4 mb-20">
        <form id="main-form" enctype="multipart/form-data">
            
            <!-- 1. 文件上传区域 -->
            <div class="mb-8">
                <label class="block text-gray-800 font-semibold mb-4 text-lg">1. 上传带讲义的演示文稿 (.pptx)</label>
                <div class="flex items-center justify-center w-full">
                    <label id="dropzone" for="dropzone-file" class="flex flex-col items-center justify-center w-full h-32 border-2 border-blue-300 border-dashed rounded-xl cursor-pointer bg-blue-50 hover:bg-blue-100 transition-all duration-300">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                            <svg class="w-8 h-8 text-blue-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="text-sm text-gray-500"><span class="font-semibold text-blue-600">点击上传</span> 或拖拽文件</p>
                        </div>
                        <input id="dropzone-file" name="file" type="file" class="hidden" accept=".pptx" required />
                    </label>
                </div>
                <p id="file-name" class="mt-2 text-sm text-green-600 font-bold text-center h-5"></p>
            </div>

            <!-- 2. 配音角色选择 (动态) -->
            <div class="mb-8">
                <label class="block text-gray-800 font-semibold mb-4 text-lg">2. 选择配音角色</label>
                <div id="voice-list" class="grid grid-cols-2 gap-3">
                    
                    <!-- 系统默认音色 (Edge TTS, 无需克隆) -->
                    <label class="cursor-pointer">
                        <input type="radio" name="voice" value="zh-CN-XiaoxiaoNeural" class="peer sr-only" {% if not voices %}checked{% endif %}>
                        <div class="p-3 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all flex items-center">
                            <div class="w-10 h-10 rounded-full bg-pink-100 text-pink-500 flex items-center justify-center mr-3">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <div><h3 class="font-bold text-sm text-gray-800">甜美女生</h3><p class="text-xs text-gray-400">系统默认</p></div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="voice" value="zh-CN-YunjianNeural" class="peer sr-only">
                        <div class="p-3 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all flex items-center">
                            <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-500 flex items-center justify-center mr-3">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <div><h3 class="font-bold text-sm text-gray-800">深沉男生</h3><p class="text-xs text-gray-400">系统默认</p></div>
                        </div>
                    </label>

                    <!-- 用户已创建的音色 (Jinja 服务端渲染) -->
                    {% for v in voices %}
                    <label class="cursor-pointer relative group">
                        <input type="radio" name="voice" value="{{ v.cosyvoice_speaker_id }}" class="peer sr-only">
                        <div class="p-3 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all flex items-center">
                            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-3 text-lg font-bold">🎤</div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-sm text-gray-800 truncate">{{ v.voice_name }}</h3>
                                <p class="text-xs text-gray-400 truncate">我的音色</p>
                            </div>
                            <button type="button" onclick="deleteVoice({{ v.id }}, '{{ v.voice_name }}')" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all p-1" title="删除">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </label>
                    {% endfor %}

                    <!-- 创建新音色按钮 -->
                    <label class="cursor-pointer" onclick="openVoiceModal()">
                        <div class="p-3 rounded-xl border-2 border-dashed border-gray-300 bg-gray-50 hover:bg-blue-50 hover:border-blue-300 transition-all flex items-center justify-center h-full min-h-[60px]">
                            <svg class="w-5 h-5 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            <span class="text-sm font-semibold text-gray-500">创建新音色</span>
                        </div>
                    </label>

                    <!-- 临时克隆 (不保存) -->
                    <label class="cursor-pointer">
                        <input type="radio" name="voice" value="zero_shot" class="peer sr-only" onchange="toggleZeroShot(this.checked)">
                        <div class="p-3 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-orange-500 peer-checked:bg-orange-50 transition-all flex items-center">
                            <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 flex items-center justify-center mr-3">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                            </div>
                            <div><h3 class="font-bold text-sm text-gray-800">临时克隆</h3><p class="text-xs text-gray-400">不保存音色</p></div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- 🆕 2.5 零样本克隆上传区域 (初始化隐藏) -->
            <div id="zero-shot-settings" class="mb-8 p-6 bg-red-50 border-2 border-red-100 rounded-2xl hidden transition-all">
                <h3 class="text-red-800 font-bold mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    教师声音克隆配置
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">1. 上传 5-10s 参考录音 (WAV/MP3)</label>
                        <input type="file" name="prompt_wav" accept=".wav,.mp3" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-100 file:text-red-700 hover:file:bg-red-200">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">2. 输入参考音频中的原话</label>
                        <textarea name="prompt_text" rows="2" class="w-full p-3 border-2 border-red-100 rounded-xl focus:ring-red-500 focus:border-red-500 text-sm" placeholder="例如：大家好，今天我们来学习关于深度学习的课程..."></textarea>
                    </div>
                </div>
            </div>

            <!-- 🆕 3. 视频模式选择 (新增功能) -->
            <div class="mb-10">
                <label class="block text-gray-800 font-semibold mb-4 text-lg">3. 选择视频模式</label>
                <div class="grid grid-cols-2 gap-4">
                    
                    <!-- 选项 A: 演播室模式 (Studio) -->
                    <label class="cursor-pointer relative group">
                        <input type="radio" name="video_mode" value="studio" class="peer sr-only" checked>
                        <div class="p-4 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-purple-500 peer-checked:bg-purple-50 transition-all flex flex-col items-center text-center shadow-sm">
                            <div class="w-12 h-12 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center mb-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                            <h3 class="font-bold text-gray-800">演播室模式</h3>
                            <p class="text-xs text-gray-500 mt-1">带科技感背景，画面更专业</p>
                        </div>
                    </label>

                    <!-- 选项 B: 标准全屏 (Default) -->
                    <label class="cursor-pointer relative group">
                        <input type="radio" name="video_mode" value="default" class="peer sr-only">
                        <div class="p-4 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-green-500 peer-checked:bg-green-50 transition-all flex flex-col items-center text-center shadow-sm">
                            <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center mb-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                            </div>
                            <h3 class="font-bold text-gray-800">标准全屏</h3>
                            <p class="text-xs text-gray-500 mt-1">PPT 100% 充满屏幕，无背景</p>
                        </div>
                    </label>

                </div>
            </div>

            <!-- 提交按钮 -->
            <button id="submit-btn" type="submit" class="w-full text-white bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 focus:ring-4 focus:ring-blue-300 font-bold rounded-xl text-lg px-5 py-4 text-center flex justify-center items-center shadow-lg transform transition hover:-translate-y-0.5">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                立即生成视频
            </button>
        </form>
    </div>

    <!-- 🆕 进度面板 (初始隐藏) -->
    <div id="progress-panel" class="fixed inset-0 bg-gray-900 bg-opacity-85 hidden flex-col items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-lg w-full mx-4">
            
            <!-- 标题 -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mx-auto mb-4">
                    <svg id="progress-icon-spin" class="w-8 h-8 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <svg id="progress-icon-done" class="w-8 h-8 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <svg id="progress-icon-error" class="w-8 h-8 hidden text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>
                <h2 id="progress-title" class="text-2xl font-bold text-gray-900">正在生成视频</h2>
            </div>

            <!-- 阶段指示器 -->
            <div class="flex items-center justify-between mb-6 px-2">
                <div id="stage-parse" class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold transition-all duration-300">1</div>
                    <span class="text-xs text-gray-400 mt-1">解析</span>
                </div>
                <div class="flex-1 h-1 bg-gray-200 mx-2 rounded"><div id="line-1" class="h-full bg-blue-500 rounded transition-all duration-500" style="width:0%"></div></div>
                <div id="stage-tts" class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold transition-all duration-300">2</div>
                    <span class="text-xs text-gray-400 mt-1">合成</span>
                </div>
                <div class="flex-1 h-1 bg-gray-200 mx-2 rounded"><div id="line-2" class="h-full bg-blue-500 rounded transition-all duration-500" style="width:0%"></div></div>
                <div id="stage-render" class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold transition-all duration-300">3</div>
                    <span class="text-xs text-gray-400 mt-1">渲染</span>
                </div>
                <div class="flex-1 h-1 bg-gray-200 mx-2 rounded"><div id="line-3" class="h-full bg-blue-500 rounded transition-all duration-500" style="width:0%"></div></div>
                <div id="stage-merge" class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold transition-all duration-300">4</div>
                    <span class="text-xs text-gray-400 mt-1">合并</span>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="w-full bg-gray-200 rounded-full h-4 mb-4 overflow-hidden">
                <div id="progress-bar" class="progress-bar-fill h-4 rounded-full" style="width: 0%"></div>
            </div>

            <!-- 进度详情 -->
            <p id="progress-detail" class="text-sm text-gray-500 text-center mb-2">准备中...</p>
            <p id="progress-percent" class="text-center text-2xl font-bold text-blue-600">0%</p>
        </div>
    </div>

    <script>
        // ─── 文件拖拽 ───
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('dropzone-file');
        const fileNameDisplay = document.getElementById('file-name');

        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('bg-blue-100', 'border-blue-500'); });
        dropzone.addEventListener('dragleave', e => { e.preventDefault(); dropzone.classList.remove('bg-blue-100', 'border-blue-500'); });
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('bg-blue-100', 'border-blue-500');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', e => { if(e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            fileNameDisplay.innerText = '✅ ' + file.name;
            dropzone.classList.add('border-green-400', 'bg-green-50');
        }

        // ─── Zero-Shot 切换 ───
        function toggleZeroShot(show) {
            const settings = document.getElementById('zero-shot-settings');
            if (show) { settings.classList.remove('hidden'); }
            else { settings.classList.add('hidden'); }
        }
        document.querySelectorAll('input[name="voice"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value !== 'zero_shot') { toggleZeroShot(false); }
            });
        });

        // ─── 阶段映射 ───
        const STAGE_ORDER = ['parse', 'tts', 'render', 'merge', 'done'];
        const STAGE_LABELS = {
            'init': '初始化', 'parse': '解析PPT', 'tts': '语音合成',
            'render': '视频渲染', 'merge': '合并输出', 'done': '完成', 'error': '出错'
        };

        function setStageState(stageId, state) {
            // state: 'pending' | 'active' | 'done' | 'error'
            const el = document.querySelector(`#${stageId} > div`);
            if (!el) return;
            el.classList.remove('bg-gray-200', 'text-gray-400', 'bg-blue-500', 'text-white',
                               'bg-green-500', 'bg-red-500', 'stage-active');
            if (state === 'active') {
                el.classList.add('bg-blue-500', 'text-white', 'stage-active');
            } else if (state === 'done') {
                el.classList.add('bg-green-500', 'text-white');
                el.innerHTML = '✓';
            } else if (state === 'error') {
                el.classList.add('bg-red-500', 'text-white');
                el.innerHTML = '✗';
            } else {
                el.classList.add('bg-gray-200', 'text-gray-400');
            }
        }

        function updateStageLines(currentStage) {
            const idx = STAGE_ORDER.indexOf(currentStage);
            document.getElementById('line-1').style.width = idx >= 1 ? '100%' : '0%';
            document.getElementById('line-2').style.width = idx >= 2 ? '100%' : '0%';
            document.getElementById('line-3').style.width = idx >= 3 ? '100%' : '0%';
        }

        function updateProgressUI(data) {
            const stage = data.stage;
            const current = data.current || 0;
            const total = data.total || 1;
            const detail = data.detail || '';
            const done = data.done || false;
            const success = data.success !== false;

            // 更新详情文字
            document.getElementById('progress-detail').textContent = detail;

            // 根据阶段计算总体百分比
            let overallPercent = 0;
            const stageWeights = { parse: 10, tts: 50, render: 30, merge: 10 };

            if (stage === 'init' || stage === 'waiting') {
                overallPercent = 0;
            } else if (stage === 'parse') {
                overallPercent = total > 0 ? Math.round(10 * current / total) : 5;
            } else if (stage === 'tts') {
                overallPercent = 10 + Math.round(50 * current / Math.max(total, 1));
            } else if (stage === 'render') {
                overallPercent = 60 + Math.round(30 * current / Math.max(total, 1));
            } else if (stage === 'merge') {
                overallPercent = 90 + Math.round(10 * current / Math.max(total, 1));
            } else if (stage === 'done') {
                overallPercent = 100;
            } else if (stage === 'error') {
                // keep current
            }

            document.getElementById('progress-bar').style.width = overallPercent + '%';
            document.getElementById('progress-percent').textContent = overallPercent + '%';

            // 更新阶段指示器
            const stageIds = ['stage-parse', 'stage-tts', 'stage-render', 'stage-merge'];
            const stageKeys = ['parse', 'tts', 'render', 'merge'];
            const currentIdx = stageKeys.indexOf(stage);

            stageKeys.forEach((key, i) => {
                if (stage === 'error') {
                    if (i === currentIdx || (currentIdx === -1 && i === 0)) setStageState(stageIds[i], 'error');
                    else if (i < currentIdx) setStageState(stageIds[i], 'done');
                    else setStageState(stageIds[i], 'pending');
                } else if (stage === 'done') {
                    setStageState(stageIds[i], 'done');
                } else {
                    if (i < currentIdx) setStageState(stageIds[i], 'done');
                    else if (i === currentIdx) setStageState(stageIds[i], 'active');
                    else setStageState(stageIds[i], 'pending');
                }
            });
            updateStageLines(stage);

            // 完成或失败
            if (done) {
                document.getElementById('progress-icon-spin').classList.add('hidden');
                if (success) {
                    document.getElementById('progress-icon-done').classList.remove('hidden');
                    document.getElementById('progress-title').textContent = '🎉 视频生成完成！';
                    document.getElementById('progress-percent').classList.remove('text-blue-600');
                    document.getElementById('progress-percent').classList.add('text-green-600');
                    // 2秒后自动跳转
                    if (data.redirect) {
                        setTimeout(() => { window.location.href = data.redirect; }, 1500);
                    }
                } else {
                    document.getElementById('progress-icon-error').classList.remove('hidden');
                    document.getElementById('progress-title').textContent = '❌ 生成失败';
                    document.getElementById('progress-title').classList.add('text-red-600');
                    document.getElementById('progress-percent').classList.remove('text-blue-600');
                    document.getElementById('progress-percent').classList.add('text-red-600');
                    document.getElementById('progress-bar').style.background = '#ef4444';
                }
            }
        }

        // ─── 表单提交 (AJAX + SSE) ───
        document.getElementById('main-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            const formData = new FormData(e.target);

            try {
                const resp = await fetch('/', { method: 'POST', body: formData });
                const result = await resp.json();

                if (result.error) {
                    alert('错误: ' + result.error);
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    return;
                }

                const sessionId = result.session_id;

                // 显示进度面板
                document.getElementById('progress-panel').classList.remove('hidden');
                document.getElementById('progress-panel').classList.add('flex');

                // 开始 SSE 监听
                const evtSource = new EventSource(`/api/progress/${sessionId}`);
                evtSource.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    updateProgressUI(data);
                    if (data.done) {
                        evtSource.close();
                    }
                };
                evtSource.onerror = () => {
                    evtSource.close();
                    updateProgressUI({ stage: 'error', done: true, success: false, detail: '连接中断' });
                };

            } catch (err) {
                alert('提交失败: ' + err.message);
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>

    <!-- 🆕 创建音色弹窗 -->
    <div id="voice-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-900">🎤 创建专属音色</h2>
                <button onclick="closeVoiceModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <form id="voice-form">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">音色名称</label>
                    <input type="text" id="vm-name" name="voice_name" required maxlength="20" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none" placeholder="例如：我的声音">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">参考音频中说的原话</label>
                    <textarea id="vm-text" name="prompt_text" required rows="2" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none resize-none" placeholder="请准确输入录音中的内容"></textarea>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">上传参考录音</label>
                    <input type="file" id="vm-file" name="prompt_wav" accept="audio/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 file:font-semibold hover:file:bg-blue-100">
                    <p class="text-xs text-gray-400 mt-1">建议 5-15 秒清晰录音，WAV/MP3 均可</p>
                </div>
                <div id="vm-status" class="mb-4 hidden"></div>
                <button type="submit" id="vm-btn" class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold rounded-xl shadow-lg transition">
                    创建音色
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- 音色管理 ---
        function openVoiceModal() {
            document.getElementById('voice-modal').classList.remove('hidden');
            document.getElementById('voice-modal').classList.add('flex');
        }
        function closeVoiceModal() {
            document.getElementById('voice-modal').classList.add('hidden');
            document.getElementById('voice-modal').classList.remove('flex');
            document.getElementById('voice-form').reset();
            document.getElementById('vm-status').classList.add('hidden');
        }

        document.getElementById('voice-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('vm-btn');
            const status = document.getElementById('vm-status');
            btn.disabled = true;
            btn.textContent = '正在创建...';
            status.classList.add('hidden');

            const fd = new FormData(e.target);
            try {
                const resp = await fetch('/api/voices/create', { method: 'POST', body: fd });
                const result = await resp.json();
                if (result.error) {
                    status.className = 'mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600';
                    status.textContent = result.error;
                    status.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = '创建音色';
                } else {
                    // 成功 → 动态插入音色卡片（不刷新页面，保留已上传的 PPT）
                    const v = result.voice;
                    const card = document.createElement('label');
                    card.className = 'cursor-pointer relative group';
                    card.innerHTML = `
                        <input type="radio" name="voice" value="${v.cosyvoice_speaker_id}" class="peer sr-only" checked>
                        <div class="p-3 rounded-xl border-2 border-gray-200 bg-white hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all flex items-center">
                            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-3 text-lg font-bold">🎤</div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-sm text-gray-800 truncate">${v.voice_name}</h3>
                                <p class="text-xs text-gray-400 truncate">我的音色</p>
                            </div>
                            <button type="button" onclick="deleteVoice(${v.id}, '${v.voice_name}')" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all p-1" title="删除">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>`;
                    // 插入到"创建新音色"按钮前面
                    const list = document.getElementById('voice-list');
                    const createBtn = list.querySelector('[onclick="openVoiceModal()"]');
                    list.insertBefore(card, createBtn);
                    closeVoiceModal();
                }
            } catch(err) {
                status.className = 'mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600';
                status.textContent = '网络错误: ' + err.message;
                status.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '创建音色';
            }
        });

        async function deleteVoice(voiceId, voiceName) {
            if (!confirm(`确定删除音色「${voiceName}」吗？`)) return;
            const fd = new FormData();
            fd.append('voice_id', voiceId);
            try {
                const resp = await fetch('/api/voices/delete', { method: 'POST', body: fd });
                const result = await resp.json();
                if (result.error) {
                    alert(result.error);
                } else {
                    location.reload();
                }
            } catch(err) {
                alert('删除失败: ' + err.message);
            }
        }
    </script>
</body>
</html>
