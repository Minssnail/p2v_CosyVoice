<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - PPT语音视频生成系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
        .tab-inactive { border-color: transparent; color: #6b7280; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">PPT语音视频生成系统</h1>
            <p class="text-gray-400 text-sm mt-1">登录后即可使用专属音色</p>
        </div>

        <!-- Tabs -->
        <div class="flex mb-8 border-b">
            <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-3 text-center font-semibold border-b-2 transition-all tab-active">登录</button>
            <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-3 text-center font-semibold border-b-2 transition-all tab-inactive">注册</button>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center">
            <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-xl text-sm text-green-600 flex items-center">
            <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            {{ success }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form id="form-login" method="POST" action="/login" class="">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">用户名</label>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all" placeholder="请输入用户名">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">密码</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all" placeholder="请输入密码">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold rounded-xl shadow-lg transform transition hover:-translate-y-0.5">
                登录
            </button>
        </form>

        <!-- Register Form -->
        <form id="form-register" method="POST" action="/register" class="hidden">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">用户名</label>
                <input type="text" name="username" required minlength="2" maxlength="20" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-100 outline-none transition-all" placeholder="2-20个字符">
            </div>
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">显示名称</label>
                <input type="text" name="display_name" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-100 outline-none transition-all" placeholder="默认与用户名相同">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">密码</label>
                <input type="password" name="password" required minlength="4" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-100 outline-none transition-all" placeholder="至少4个字符">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-bold rounded-xl shadow-lg transform transition hover:-translate-y-0.5">
                注册账号
            </button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const registerBtn = document.getElementById('tab-register');
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            if (tab === 'login') {
                loginBtn.className = loginBtn.className.replace('tab-inactive', 'tab-active');
                registerBtn.className = registerBtn.className.replace('tab-active', 'tab-inactive');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerBtn.className = registerBtn.className.replace('tab-inactive', 'tab-active');
                loginBtn.className = loginBtn.className.replace('tab-active', 'tab-inactive');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }
        // Auto-switch to register tab if there's a register-related error
        {% if tab == 'register' %}
        switchTab('register');
        {% endif %}
    </script>
</body>
</html>
